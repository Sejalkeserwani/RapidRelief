<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital AI Bot - Control Tower</title>
    <link rel="stylesheet" href="Bot-style.css">
</head>
<body>
    <div class="admin-container">
        <h1>Hospital AI Control</h1>
        
        <div class="card setup-card">
            <h3>Facility Setup</h3>
            <div class="input-group">
                <label for="capacity-input">Total Bed Capacity:</label>
                <input type="number" id="capacity-input" value="20" min="1" onchange="setNewTotal()">
            </div>
        </div>

        <div id="status-card" class="card status-open">
            <h2 id="intake-text">BOT STATUS: ACCEPTING</h2>
            <p id="bot-reason">AI is monitoring live resource data...</p>
            <button id="toggle-btn" onclick="toggleManualOverride()">Manual Override: Set to BUSY</button>
        </div>

        <div class="card">
            <h3>Live Occupancy</h3>
            <div class="counter-box">
                <button class="count-btn" onclick="updateBeds(-1)">−</button>
                <div class="display-text">
                    <span id="bed-count">0</span> / <span id="total-beds-display">20</span>
                </div>
                <button class="count-btn" onclick="updateBeds(1)">+</button>
            </div>
            <div id="progress-container" class="progress-bg">
                <div id="progress-bar" class="progress-fill"></div>
            </div>
            <p id="capacity-warning" class="warning-text hidden">🚨 CAPACITY REACHED - REDIRECT ACTIVE</p>
        </div>
    </div>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="Bot-script.js"></script>
</body>
</html>
